<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Guide - ArduinoSim</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0d1020;
            --bg-surface: #151a2a;
            --panel-bg: #1b2136;
            --panel-strong: #222842;
            --border-color: #2b3250;
            --text-main: #f6f7ff;
            --text-muted: #8e95b8;
            --accent-neon: #4af09a;
            --accent-red: #ff5d5d;
            --shadow-strong: rgba(0, 0, 0, 0.35);
            --shadow-soft: rgba(0, 0, 0, 0.18);
            
            --cat-motion: #4d97ff;
            --cat-control: #ffab19;
            --cat-sensing: #5cb1d6;
            --cat-loops: #ffca1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            overflow-y: auto;
        }

        #container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 900;
            margin: 32px 0 16px;
            color: var(--text-main);
            letter-spacing: 0.01em;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-neon), #5ef5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.8rem;
            border-bottom: 2px solid rgba(74, 240, 154, 0.2);
            padding-bottom: 12px;
        }

        h3 {
            font-size: 1.3rem;
            color: var(--text-main);
        }

        h4 {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Paragraphs & Text */
        p {
            margin: 14px 0;
            color: var(--text-main);
            line-height: 1.7;
        }

        strong {
            font-weight: 900;
            color: var(--accent-neon);
        }

        em {
            font-style: italic;
            color: var(--text-muted);
        }

        a {
            color: var(--accent-neon);
            text-decoration: none;
            border-bottom: 1px dotted rgba(74, 240, 154, 0.4);
            transition: all 0.2s ease;
        }

        a:hover {
            border-bottom-color: var(--accent-neon);
            text-decoration: underline;
        }

        /* Lists */
        ul, ol {
            margin: 16px 0;
            padding-left: 28px;
        }

        li {
            margin: 8px 0;
            color: var(--text-main);
            line-height: 1.7;
        }

        /* Code */
        code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 8px;
            border-radius: 6px;
            color: #d8def5;
            font-size: 0.9em;
            font-weight: 600;
        }

        pre {
            background: #0f1320;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            overflow-x: auto;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 12px 24px var(--shadow-soft);
        }

        pre code {
            background: none;
            padding: 0;
            color: #d8def5;
            font-size: 0.85em;
            line-height: 1.5;
            display: block;
        }

        /* Blockquotes */
        blockquote {
            border-left: 4px solid var(--accent-neon);
            padding-left: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            background: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        th {
            background: rgba(74, 240, 154, 0.1);
            padding: 12px 16px;
            text-align: left;
            font-weight: 900;
            color: var(--accent-neon);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Callouts / Highlights */
        .note, .warning, .tip, .info {
            margin: 20px 0;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid;
            background: rgba(255, 255, 255, 0.02);
        }

        .note {
            border-left-color: var(--accent-neon);
            background: rgba(74, 240, 154, 0.08);
        }

        .warning {
            border-left-color: var(--accent-red);
            background: rgba(255, 93, 93, 0.08);
        }

        .tip {
            border-left-color: var(--cat-loops);
            background: rgba(255, 202, 26, 0.08);
        }

        .info {
            border-left-color: var(--cat-sensing);
            background: rgba(92, 177, 214, 0.08);
        }

        /* HR */
        hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color) 50%, transparent);
            margin: 40px 0;
        }

        /* Horizontal spacing */
        section {
            margin: 40px 0;
        }

        /* Back to App Link */
        #back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-neon);
            font-weight: 900;
            margin-bottom: 24px;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        #back-link:hover {
            transform: translateX(-4px);
        }

        /* Loading state */
        #content {
            min-height: 200px;
        }

        #content.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            h3 {
                font-size: 1.1rem;
            }

            pre {
                padding: 12px;
                font-size: 0.75em;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px 12px;
            }
        }

        @media (max-width: 480px) {
            #container {
                padding: 16px 12px;
            }

            h1 {
                font-size: 1.4rem;
            }

            h2 {
                font-size: 1.1rem;
            }

            ul, ol {
                padding-left: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <a id="back-link" href="javascript:history.back()">← Back</a>
        <div id="content" class="loading"></div>
    </div>

    <script>
        async function loadMarkdown() {
            try {
                const response = await fetch('developer-guide.md');
                if (!response.ok) throw new Error(`Failed to load: ${response.statusText}`);
                
                const markdown = await response.text();
                const html = marked.parse(markdown);
                
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = html;
                contentDiv.classList.remove('loading');
            } catch (error) {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = `
                    <p style="color: var(--accent-red);">
                        Failed to load guide. <a href="javascript:location.reload()">Try reloading.</a>
                    </p>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadMarkdown);
    </script>
</body>
</html>
